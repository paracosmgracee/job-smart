version: 2

sources:
  - name: raw
    database: JOB_MARKET
    schema: RAW
    tables:
      - name: JOB_POSTINGS
      - name: JOB_SKILLS
      - name: COMPANIES
      - name: ADZUNA_POSTINGS
      - name: JSEARCH_POSTINGS

models:
  - name: stg_job_postings
    description: Cleaned job postings with normalized salary
    columns:
      - name: job_id
        tests: [not_null, unique]
      - name: company_name
        tests: [not_null]
      - name: job_title
        tests: [not_null]

  - name: stg_job_skills
    description: Skill tags per job (one row per skill per job)
    columns:
      - name: job_id
        tests: [not_null]
      - name: skill_id
        tests: [not_null]

  - name: stg_companies
    description: Company metadata
    columns:
      - name: company_id
        tests: [not_null, unique]
